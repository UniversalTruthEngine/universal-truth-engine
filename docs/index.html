<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Truth Engine — 3D Truth Cosmos</title>
<link rel="stylesheet" href="style.css">
<script type="importmap">

<body>
<main>
<section class="topbar">
<div>
<p class="eyebrow">Universal Truth Engine</p>
<h1>3D Truth Cosmos</h1>

<section class="workspace">

</aside>
</section>
<section class="notes"><p id="status">Loading UTE map...</p></section>
</main>
<script type="module" src="./graph.js"></script>
